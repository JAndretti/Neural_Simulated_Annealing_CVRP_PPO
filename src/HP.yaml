PROJECT: "Neural_Simulated_Annealing"
GROUP: "CVRP with advencment"

# Wandb
LOG: False

# Device
DEVICE: "cuda"

# SA
INIT_TEMP: 1
STOP_TEMP: 0.01
OUTER_STEPS: 100
INNER_STEPS: 1
SCHEDULER: "lam"

#Seed
SEED: 42

#CVRP
PROBLEM_DIM: 20
MAX_LOAD: 30
N_PROBLEMS: 256
CLUSTERING: True
NB_CLUSTERS_MAX: 5

#Model
C1: 7
C2: 13
C: 7
EMBEDDING_DIM: 16
DEMANDS: True
PAIRS: True

#Training
LR: 0.0001
WEIGHT_DECAY: 0.01
N_EPOCHS: 500
BATCH_SIZE: 512

#Algo
METHOD: "ppo"

#PPO
PPO_EPOCHS: 10
TRACE_DECAY: 0.9
EPS_CLIP: 0.25
LOSS: min_cost
REWARD: immediate
GAMMA: 0.9

OR_TOOLS_TIME: 1
